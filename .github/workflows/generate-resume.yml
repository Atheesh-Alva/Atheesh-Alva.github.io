name: Generate Resume PDF

on:
  push:
    paths:
      - 'resume.json'
      - 'resume-template.html'
      - 'scripts/generate-resume.js'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate resume PDF
        run: node scripts/generate-resume.js

      - name: Verify PDF was created
        run: |
          if [ ! -f "assets/resume/myresume.pdf" ]; then
            echo "❌ PDF not found at assets/resume/myresume.pdf"
            exit 1
          fi
          echo "✅ PDF found: $(du -h assets/resume/myresume.pdf | cut -f1)"

      - name: Commit the new PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/resume/atheesh-alva-resume.pdf
          git diff --cached --quiet || git commit -m "chore: auto-update atheesh-alva-resume.pdf"
          git push
